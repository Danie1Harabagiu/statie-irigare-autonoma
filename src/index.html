<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stare Stație Autonomă</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-backdrop">
        <div class="dashboard-container">
            
            <header class="top-bar">
                <div class="title-area">
                    <i class="fa-solid fa-solar-panel text-blue"></i>
                    <h1>STARE STAȚIE AUTONOMĂ</h1>
                </div>
                <div class="connection-area">
                    <span class="status-indicator" id="statusBT"><i class="fa-solid fa-link"></i> CONECTAT</span>
                    <button id="btnConnect" class="btn-outline">DECONECTEAZĂ</button>
                </div>
            </header>

            <div class="main-layout">
                
                <div class="left-column">
                    
                    <section class="panel">
                        <h2><i class="fa-solid fa-bolt"></i> SISTEM ENERGETIC</h2>
                        <div class="metrics-grid">
                            <div class="metric-card glass-card">
                                <p class="metric-title">BATERIE</p>
                                <i id="iconBaterie" class="fa-solid fa-battery-full icon-large text-green"></i>
                                <p class="metric-value text-green" id="valBaterie">--%</p>
                            </div>
                            <div class="metric-card glass-card highlight-orange">
                                <p class="metric-title">PANOU SOLAR</p>
                                <i id="iconLumina" class="fa-solid fa-sun icon-large text-orange"></i>
                                <p class="metric-value text-orange" id="valLumina">--%</p>
                                <p class="metric-sub-voltage" id="valVPanou">-- V</p>
                            </div>
                        </div>
                    </section>

                    <section class="panel">
                        <h2><i class="fa-solid fa-water"></i> SURSE APĂ</h2>
                        <div class="metrics-grid">
                            <div class="metric-card glass-card">
                                <p class="metric-title">FÂNTÂNĂ (HELED)</p>
                                <i id="iconFantana" class="fa-solid fa-bore-hole icon-large text-blue"></i>
                                <p class="metric-value text-blue" id="valFantana">--%</p>
                            </div>
                            <div class="metric-card glass-card highlight-red">
                                <p class="metric-title">BAZIN PRINCIPAL</p>
                                <i id="iconBazin" class="fa-solid fa-glass-water icon-large text-red"></i>
                                <p class="metric-value text-red" id="valBazin">--%</p>
                            </div>
                        </div>
                    </section>

                    <section class="panel">
                        <h2><i class="fa-solid fa-leaf"></i> MEDIU & SOL</h2>
                        <div class="metrics-grid">
                            <div class="metric-card glass-card">
                                <p class="metric-title">UMIDITATE SOL</p>
                                <i id="iconSol" class="fa-solid fa-seedling icon-large text-green"></i>
                                <p class="metric-value text-green" id="valSol">--%</p>
                            </div>
                            <div class="metric-card glass-card env-details">
                                <div><i class="fa-solid fa-temperature-half text-gray"></i> TEMP: <strong id="valTemp">--°C</strong></div>
                                <div style="margin-top: 12px;"><i class="fa-solid fa-droplet text-gray"></i> UMID: <strong id="valUmid">--%</strong></div>
                            </div>
                        </div>
                    </section>

                </div>

                <div class="right-column">
                    
                    <div class="mode-selector-container">
                        <div class="mode-selector">
                            <button id="btnAuto" class="mode-btn active">[ AUTOMAT ]</button>
                            <button id="btnManual" class="mode-btn">MANUAL</button>
                        </div>
                    </div>

                    <section class="panel control-panel glass-panel-right">
                        <h2>CONTROL MANUAL (DEZACTIVAT)</h2>
                        <div class="control-buttons">
                            <button id="btnP1" class="action-btn disabled">
                                <i class="fa-solid fa-faucet-drip"></i>
                                <span>POMPĂ BAZIN</span>
                                <small class="warning-text" id="statP1">STARE: OPRIT</small>
                            </button>
                            
                            <button id="btnP2" class="action-btn disabled">
                                <i class="fa-solid fa-shower"></i>
                                <span>POMPĂ GRĂDINĂ</span>
                                <small class="warning-text" id="statP2">STARE: OPRIT</small>
                            </button>
                        </div>
                    </section>
                </div>

            </div>

            <div class="alert-bar" id="serialConsole">
                <i class="fa-solid fa-terminal"></i> Așteptare conexiune...
            </div>

        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
